<svg viewBox="0 0 210 240" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes twinkle-a {
      0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:1;transform:scale(1.5)}
    }
    @keyframes twinkle-b {
      0%,100%{opacity:.6} 35%{opacity:.08} 70%{opacity:.85}
    }
    @keyframes twinkle-c {
      0%{opacity:.35} 40%{opacity:1} 65%{opacity:.1} 100%{opacity:.5}
    }
    @keyframes blink {
      0%,90%,100%{transform:scaleY(1)} 93%{transform:scaleY(.04)} 96%{transform:scaleY(1)}
    }
    @keyframes ball-breathe {
      0%,100%{filter:drop-shadow(0 0 8px #0055cc77)}
      50%{filter:drop-shadow(0 0 22px #00aaff99) drop-shadow(0 0 44px #0055ff44)}
    }
    .star { transform-box:fill-box; transform-origin:center; }
    .star.a { animation:twinkle-a 3.2s ease-in-out infinite; }
    .star.b { animation:twinkle-b 2.6s ease-in-out infinite; animation-delay:-1.1s; }
    .star.c { animation:twinkle-c 4.3s ease-in-out infinite; animation-delay:-2.6s; }
    .star.d { animation:twinkle-a 5.1s ease-in-out infinite; animation-delay:-3.8s; }
    #eye-blink-group { transform-box:fill-box; transform-origin:105px 108px; animation:blink 6s ease-in-out infinite; }
    #ball-root { animation:ball-breathe 3.5s ease-in-out infinite; }
  </style>
  <radialGradient id="bg" cx="50%" cy="46%" r="55%">
    <stop offset="0%" stop-color="#0d2a6a"/>
    <stop offset="50%" stop-color="#040d22"/>
    <stop offset="100%" stop-color="#010408"/>
  </radialGradient>
  <radialGradient id="eg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00e8ff"/>
    <stop offset="35%" stop-color="#0088ee" stop-opacity=".9"/>
    <stop offset="100%" stop-color="#001844" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="aura" cx="50%" cy="50%" r="50%">
    <stop offset="50%" stop-color="#0044cc" stop-opacity="0"/>
    <stop offset="100%" stop-color="#0077ff" stop-opacity=".4"/>
  </radialGradient>
  <filter id="fg"><feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="fm"><feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="fs"><feGaussianBlur stdDeviation="1.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <clipPath id="clip"><circle cx="105" cy="108" r="76"/></clipPath>
</defs>
